services:
  mongo:
    image: mongo:8.2
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' || exit 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo-init:
    image: mongo:8.2
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./docker/mongo/init-replica-set.js:/scripts/init-replica-set.js:ro
    entrypoint:
      [
        "sh",
        "-c",
        "until mongosh mongodb://mongo:27017/admin /scripts/init-replica-set.js; do sleep 2; done"
      ]

  api:
    build: .
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      MONGODB_URI: mongodb://mongo:27017/lifi?replicaSet=rs0
    ports:
      - "3000:3000"
    command: ["node", "dist/src/app/api/main.js"]
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:3000/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker-polygon:
    build: .
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      MONGODB_URI: mongodb://mongo:27017/lifi?replicaSet=rs0
      WORKER_CHAIN_KEY: polygon
    command: ["node", "dist/src/app/worker/main.js"]
